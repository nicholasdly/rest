name: Build

on:
  push:
    branches: [main]
    paths: ["go.mod", "**.go", ".github/workflows/build.yml"]
  pull_request:
    branches: [main]
    paths: ["go.mod", "**.go", ".github/workflows/build.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race -count=1 ./...